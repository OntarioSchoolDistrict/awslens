key: eks
label: "EKS Clusters"
icon: eks
type: drilldown

fetch:
  service: eks
  method: list_clusters
  result_key: clusters
  wrap_as: cluster_name
  enrich: eks

filter:
  scope: region

id_field: name
name_field: name

grid:
  tile_label: "{name}\n{version} | {nodeGroupCount} node groups"
  tile_icon: eks

detail:
  sections:
    - key: info
      label: "Info"
      type: fields
      icon: eks
      row: 1
      fields:
        - name
        - version
        - status
        - platformVersion
        - createdAt

    - key: networking
      label: "Networking"
      type: fields
      icon: vpc
      row: 1
      fields:
        - endpoint
        - endpointPublicAccess
        - endpointPrivateAccess

    - key: node_groups
      label: "Node Groups"
      type: fields
      icon: eks
      row: 2
      fields:
        - nodeGroupSummary

    - key: subnets
      label: "Cluster Subnets"
      type: cross_link_list
      icon: subnet
      target: subnets
      lookup: subnets_for_eks
      row: 3

    - key: ng_subnets
      label: "Node Group Subnets"
      type: cross_link_list
      icon: subnet
      target: subnets
      lookup: subnets_for_eks_nodegroups
      row: 3

    - key: security_groups
      label: "Security Groups"
      type: cross_link_list
      icon: security_group
      target: security_groups
      lookup: security_groups_for_eks
      row: 4

links:
  html_path: "eks/{id}.html"
  d2_detail: "{raw_id}.d2"
  d2_grid: "eks.d2"
